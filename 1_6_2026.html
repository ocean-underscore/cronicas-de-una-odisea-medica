		input {

		.book {
		display: flex;

		#cover {
		width: 400px;
		height: 550px;
		}
		.flip-book {
		width: 400px;
		height: 550px;
		position: relative;
		perspective: 1500px;
		}
		.flip {
		height: 100%;
		width: 100%;
		position: absolute;
		top: 0;
		left: 0;
		transform-origin: center left;
		transform-style: preserve-3d;
		transition: 0.5s;
		color: #000;
		border-left: 1px dashed #f0f0f0;
		}
		.front {
		position: absolute;
		width: 100%;
		height: 100%;
		top: 0;
		left: 0;
		background-color: #fff;
		box-sizing: border-box;
		padding: 0 13px;

		}
		.back {
		position: absolute;
		width: 100%;
		height: 100%;
		top: 0;
		left: 0;
		z-index: 99;
		transform: rotateY(180deg);
		backface-visibility: hidden;
		background-color: #fff;
		}
		.next-btn {
		position: absolute;
		border: 2px solid black;
		border-radius: 10px;
		padding: 4px;
		bottom: 13px;
		right: 13px;
		cursor: pointer;
		color: #000;
		}
		.back-btn {
		position: absolute;
		border: 2px solid black;
		border-radius: 10px;
		padding: 4px;
		bottom: 13px;
		right: 13px;
		cursor: pointer;
		color: #000;
		}
		#p1 {
		z-index: 5;
		}
		#p2 {
		z-index: 4;
		}
		#p3 {
		z-index: 3;
		}
		#p4 {
		z-index: 2;
		}
		#p5 {
		z-index: 1;
		}
		#c1:checked ~ .flip-book #p1 {
		transform: rotateY(-180deg);
		z-index: 1;
		}
		#c2:checked ~ .flip-book #p2 {
		transform: rotateY(-180deg);
		z-index: 2;
		}
		#c3:checked ~ .flip-book #p3 {
		transform: rotateY(-180deg);
		z-index: 3;
		}
		#c4:checked ~ .flip-book #p4 {
		transform: rotateY(-180deg);
		z-index: 4;
		}
		#c5:checked ~ .flip-book #p5 {
		transform: rotateY(-180deg);
		z-index: 5;
		}

		#c3:checked ~ .flip-book #p1 {
		display: none;
		}
		#c4:checked ~ .flip-book #p2 {
		display: none;
		}
		#c5:checked ~ .flip-book #p3 {
		display: none;
		}
	</style>
